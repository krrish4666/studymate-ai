<!DOCTYPE html>
<html lang="en" data-theme="warm-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — StudyMate AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" style="display:block;text-align:center;margin-bottom:8px;font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--color-primary);">StudyMate AI</a>
      <h1>Create account</h1>
      <p class="subtitle">Start learning smarter with AI</p>

      <div id="error-message" style="color:var(--color-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--color-muted-text);">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { register, redirectIfAuthenticated } from '/static/js/auth.js';
    import { showToast } from '/static/js/utils.js';
    redirectIfAuthenticated();

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-message');
      errEl.style.display = 'none';

      try {
        await register(name, email, password);
        showToast('Account created!', 'success');
        setTimeout(() => { window.location.href = '/feature/notes'; }, 500);
      } catch (err) {
        errEl.textContent = err.detail || 'Registration failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
