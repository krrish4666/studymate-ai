<!DOCTYPE html>
<html lang="en" data-theme="warm-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — StudyMate AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" style="display:block;text-align:center;margin-bottom:8px;font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--color-primary);">StudyMate AI</a>
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email to receive an OTP</p>

      <div id="error-message" style="color:var(--color-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>
      <div id="success-message" style="color:var(--color-success);font-size:0.85rem;margin-bottom:12px;display:none;"></div>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send OTP</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem;">
        <a href="/login">Back to sign in</a>
      </p>
    </div>
  </div>

  <div id="otp-section" class="auth-card" style="display:none;margin:24px auto;max-width:420px;">
    <h2 style="text-align:center;font-size:1.25rem;">Enter OTP</h2>
    <p class="subtitle">Check your email for the 6-digit code</p>
    <form id="otp-form">
      <div class="form-group">
        <label for="otp">OTP Code</label>
        <input type="text" id="otp" class="form-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Verify OTP</button>
    </form>
  </div>

  <div id="reset-section" class="auth-card" style="display:none;margin:24px auto;max-width:420px;">
    <h2 style="text-align:center;font-size:1.25rem;">New password</h2>
    <p class="subtitle">Enter your new password</p>
    <form id="reset-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Reset Password</button>
    </form>
  </div>

  <script type="module">
    import { forgotPassword, verifyOtp, resetPassword } from '/static/js/auth.js';
    import { showToast } from '/static/js/utils.js';

    let resetToken = '';
    let userEmail = '';

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const errEl = document.getElementById('error-message');
      const successEl = document.getElementById('success-message');
      errEl.style.display = 'none';
      successEl.style.display = 'none';

      try {
        await forgotPassword(email);
        userEmail = email;
        successEl.textContent = 'If an account exists, an OTP has been sent.';
        successEl.style.display = 'block';
        document.getElementById('otp-section').style.display = 'block';
      } catch (err) {
        errEl.textContent = err.detail || 'Failed to send OTP';
        errEl.style.display = 'block';
      }
    });

    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value;
      const errEl = document.getElementById('error-message');
      errEl.style.display = 'none';

      try {
        const data = await verifyOtp(userEmail, otp);
        resetToken = data.resetToken;
        document.getElementById('reset-section').style.display = 'block';
        showToast('OTP verified', 'success');
      } catch (err) {
        errEl.textContent = err.detail || 'Invalid OTP';
        errEl.style.display = 'block';
      }
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      const errEl = document.getElementById('error-message');
      errEl.style.display = 'none';

      try {
        await resetPassword(resetToken, password);
        showToast('Password reset successfully!', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch (err) {
        errEl.textContent = err.detail || 'Failed to reset password';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
