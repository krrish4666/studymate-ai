<!DOCTYPE html>
<html lang="en" data-theme="warm-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — StudyMate AI HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" style="display:block;text-align:center;margin-bottom:8px;font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--color-primary);">StudyMate AI</a>
      <h1>Set new password</h1>
      <p class="subtitle">Enter your new password below</p>

      <div id="error-message" style="color:var(--color-error);font-size:0.85rem;margin-bottom:12px;display:none;"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-input" placeholder="Min 8 characters" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Reset Password</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem;">
        <a href="/login">Back to sign in</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { resetPassword } from '/static/js/auth.js';
    import { showToast } from '/static/js/utils.js';

    const params = new URLSearchParams(location.search);
    const resetToken = params.get('token');

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('new-password').value;
      const errEl = document.getElementById('error-message');
      errEl.style.display = 'none';

      try {
        await resetPassword(resetToken, password);
        showToast('Password reset! Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch (err) {
        errEl.textContent = err.detail || 'Failed to reset password';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
